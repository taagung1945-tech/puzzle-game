<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0758c9">
<title>Belajar Microsoft Word - Game Puzzle</title>
<link rel="icon" href="assets/img/icon-32.png">
<style>
:root{--stage-w:1366;--stage-h:768}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#06172f;font-family:Arial,sans-serif}
body{touch-action:none;user-select:none}
#stage{position:absolute;left:50%;top:50%;width:1366px;height:768px;transform-origin:center center;overflow:hidden;background:white;box-shadow:0 18px 80px rgba(0,0,0,.45)}
.scene-bg{position:absolute;inset:0;width:1366px;height:768px;object-fit:fill;pointer-events:none}
.control{position:absolute;border:0;padding:0;margin:0;background:transparent;cursor:pointer;touch-action:manipulation;z-index:20;transition:transform .13s ease,filter .13s ease}
.control:hover,.control:focus-visible{transform:scale(1.045);filter:brightness(1.06);outline:none}
.control:active{transform:scale(.975)}
.control img{display:block;width:100%;height:100%;object-fit:fill;pointer-events:none}
.hotspot{background:rgba(0,0,0,0);border-radius:18px}
.hotspot:hover{filter:drop-shadow(0 0 9px rgba(255,255,255,.65));background:rgba(255,255,255,.025)}
.absolute-img{position:absolute;object-fit:fill;pointer-events:none}
.stage-text{position:absolute;display:flex;align-items:center;justify-content:center;text-align:center;white-space:normal;overflow:hidden;z-index:14}
.puzzle-title{left:97px;top:212px;width:749px;height:123px;font-family:"Arial Rounded MT Bold",Arial,sans-serif;font-size:53px;font-weight:700;color:#111;line-height:1.06}
.timer{left:598px;top:105px;width:190px;height:58px;justify-content:flex-start;font-family:"Arial Rounded MT Bold",Arial,sans-serif;font-size:48px;font-weight:700;color:#000;z-index:30}
.result{left:489px;top:319px;width:390px;height:110px;font-family:"Arial Rounded MT Bold",Arial,sans-serif;font-size:64px;font-weight:700;color:#e31616;text-shadow:0 3px 0 white,0 0 15px white;z-index:70;display:none}
.piece{position:absolute;width:164px;height:153px;object-fit:fill;cursor:grab;touch-action:none;z-index:45;filter:drop-shadow(0 3px 3px rgba(0,0,0,.25));transition:filter .12s ease}
.piece.dragging{cursor:grabbing;z-index:60;filter:drop-shadow(0 10px 8px rgba(0,0,0,.38));transition:none}
.piece.locked{cursor:default;filter:none}
.ref-question{left:123px;top:200px;width:1120px;height:100px;font-size:38px;font-weight:700;color:#000058;line-height:1.1}
.ref-answer-text{left:440px;width:660px;height:54px;font-size:30px;font-weight:700;color:#000058;z-index:32;pointer-events:none}
.ref-a-text{top:378px}.ref-b-text{top:508px}
.popup{position:absolute;left:303px;top:99px;width:760px;height:570px;object-fit:fill;z-index:80;display:none;pointer-events:none;filter:drop-shadow(0 14px 22px rgba(0,0,0,.32))}
.score{left:652px;top:430px;width:165px;height:110px;font-size:62px;font-weight:700;color:#0852ba;z-index:24}
.loading{position:absolute;inset:0;background:#0758c9;display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;z-index:999;font-size:25px;font-weight:700;gap:18px}
.loading img{width:110px;height:110px;object-fit:contain;animation:pulse 1.1s infinite alternate}
@keyframes pulse{to{transform:scale(1.08)}}
#rotate-note{display:none;position:fixed;inset:0;z-index:5000;background:#06172f;color:white;align-items:center;justify-content:center;text-align:center;padding:32px;font-size:21px}
@media (orientation:portrait) and (max-width:800px){#rotate-note{display:flex}}
</style>
</head>
<body>
<div id="stage"><div class="loading"><img src="assets/img/icon-128.png" alt=""><span>Memuat media pembelajaran…</span></div></div>
<div id="rotate-note">Putar perangkat ke posisi mendatar agar media tampil dengan baik.</div>
<audio id="music" loop preload="auto"><source src="assets/audio/intro.ogg" type="audio/ogg"><source src="assets/audio/intro.m4a" type="audio/mp4"></audio>
<audio id="click" preload="auto"><source src="assets/audio/button_click.ogg" type="audio/ogg"><source src="assets/audio/button_click.m4a" type="audio/mp4"></audio>
<audio id="correct" preload="auto"><source src="assets/audio/correct.ogg" type="audio/ogg"><source src="assets/audio/correct.m4a" type="audio/mp4"></audio>
<audio id="fail" preload="auto"><source src="assets/audio/fail.ogg" type="audio/ogg"><source src="assets/audio/fail.m4a" type="audio/mp4"></audio>
<script>
const CONFIG = {"backgrounds": {"utama": "assets/img/bg_utama.png", "tp": "assets/img/bg_tp.png", "Panduan": "assets/img/bg_panduan.png", "panduan2": "assets/img/bg_panduan2.png", "materi1": "assets/img/bg_materi1.png", "materi2": "assets/img/bg_materi2.png", "materi3": "assets/img/bg_materi3.png", "materi4": "assets/img/bg_materi4.png", "materi5": "assets/img/bg_materi5.png", "Puzzle1": "assets/img/bg_puzzle1.png", "Puzzle2": "assets/img/bg_puzzle2.png", "Puzzle3": "assets/img/bg_puzzle3.png", "Puzzle4": "assets/img/bg_puzzle4.png", "Refleksi1": "assets/img/bg_refleksi1.png", "Refleksi2": "assets/img/bg_refleksi2.png", "Refleksi3": "assets/img/bg_refleksi3.png", "Refleksi4": "assets/img/bg_refleksi4.png", "Refleksi5": "assets/img/bg_refleksi5.png", "Reward": "assets/img/bg_reward.png", "LevelSelesai": "assets/img/bg_levelselesai.png"}, "visible": {"MULAI": "assets/img/mulai.png", "PANDUAN": "assets/img/panduan.png", "startbtn": "assets/img/startbtn.png", "Ref1A": "assets/img/ref1a.png", "Ref1B": "assets/img/ref1b.png", "Ref2A": "assets/img/ref2a.png", "Ref2B": "assets/img/ref2b.png", "Ref3A": "assets/img/ref3a.png", "Ref3B": "assets/img/ref3b.png", "Ref4A": "assets/img/ref4a.png", "Ref4B": "assets/img/ref4b.png", "Ref5A": "assets/img/ref5a.png", "Ref5B": "assets/img/ref5b.png", "RefBack1": "assets/img/refback1.png", "RefBack2": "assets/img/refback2.png", "RefBack3": "assets/img/refback3.png", "RefBack4": "assets/img/refback4.png", "RefBack5": "assets/img/refback5.png", "RefNext1": "assets/img/refnext1.png", "RefNext2": "assets/img/refnext2.png", "RefNext3": "assets/img/refnext3.png", "RefNext4": "assets/img/refnext4.png", "RefNext5": "assets/img/refnext5.png", "Ref2PopupOK": "assets/img/ref2popupok.png", "Ref2PopupWrong": "assets/img/ref2popupwrong.png", "GarisBiru": "assets/img/garisbiru.png", "EmptyBox": "assets/img/emptybox.png", "Sprite": "assets/img/sprite.png", "SpritePuzzle3": "assets/img/spritepuzzle3.png", "SpritePuzzle4": "assets/img/spritepuzzle4.png"}, "simpleButtons": {"utama": [{"id": "MULAI", "rect": [710.7, 543.1, 330, 96], "img": "assets/img/mulai.png", "to": "tp"}, {"id": "PANDUAN", "rect": [872.2, 633.8, 329, 92], "img": "assets/img/panduan.png", "to": "Panduan"}], "tp": [{"id": "KEMBALI", "rect": [100, 658, 330, 88], "to": "utama", "hotspot": true}, {"id": "BERIKUTNYA", "rect": [697, 658, 387, 84], "to": "materi1", "hotspot": true}], "Panduan": [{"id": "BACK", "rect": [27, 658, 90, 92], "to": "utama", "hotspot": true}, {"id": "NEXT", "rect": [1248, 658, 90, 92], "to": "panduan2", "hotspot": true}], "panduan2": [{"id": "BACK", "rect": [42, 642, 100, 102], "to": "Panduan", "hotspot": true}, {"id": "NEXT", "rect": [1218, 642, 105, 102], "to": "utama", "hotspot": true}], "materi1": [{"id": "BACK", "rect": [314, 635, 360, 110], "to": "tp", "hotspot": true}, {"id": "NEXT", "rect": [706, 635, 370, 110], "to": "materi2", "hotspot": true}], "materi2": [{"id": "BACK", "rect": [303, 638, 340, 110], "to": "materi1", "hotspot": true}, {"id": "NEXT", "rect": [716, 638, 350, 110], "to": "materi3", "hotspot": true}], "materi3": [{"id": "BACK", "rect": [303, 640, 340, 108], "to": "materi2", "hotspot": true}, {"id": "NEXT", "rect": [716, 640, 350, 108], "to": "materi4", "hotspot": true}], "materi4": [{"id": "BACK", "rect": [292, 642, 345, 105], "to": "materi3", "hotspot": true}, {"id": "NEXT", "rect": [725, 642, 350, 105], "to": "materi5", "hotspot": true}], "materi5": [{"id": "BACK", "rect": [300, 645, 350, 105], "to": "materi4", "hotspot": true}, {"id": "NEXT", "rect": [715, 645, 355, 105], "to": "Puzzle1", "hotspot": true}], "Puzzle1": [{"id": "START", "rect": [181.5, 240.5, 577, 433], "img": "assets/img/startbtn.png", "to": "Puzzle2"}], "LevelSelesai": [{"id": "LANJUT", "rect": [448, 414, 495, 142], "to": "utama", "hotspot": true}, {"id": "ULANGI", "rect": [448, 552, 495, 137], "to": "Puzzle1", "hotspot": true, "reset": true}]}, "puzzles": {"Puzzle2": {"piece": "wordpieces", "preview": "Sprite", "next": "Puzzle3", "back": "Puzzle1"}, "Puzzle3": {"piece": "wordpieces3", "preview": "SpritePuzzle3", "next": "Puzzle4", "back": "Puzzle2"}, "Puzzle4": {"piece": "wordpieces4", "preview": "SpritePuzzle4", "next": "Refleksi1", "back": "Puzzle3"}}, "reflections": {"Refleksi1": {"q": "Bagaimana cara membuat dokumen baru di Microsoft Word?", "a": "Klik File > New > Blank document", "b": "Klik Insert > Picture", "correct": "A", "next": "Refleksi2", "back": "Puzzle4", "resetQuiz": true}, "Refleksi2": {"q": "Bagaimana cara menyimpan dokumen?", "a": "Klik \"Save\" pada menu.", "b": "Tekan \"Ctrl + S\"", "correct": "B", "next": "Refleksi3", "back": "Refleksi1"}, "Refleksi3": {"q": "Menu yang dipilih untuk mencetak dokumen adalah...", "a": "Klik Save", "b": "Klik Print", "correct": "B", "next": "Refleksi4", "back": "Refleksi2"}, "Refleksi4": {"q": "Menu apa yang digunakan untuk mencetak dokumen?", "a": "Klik \"Save\" pada menu.", "b": "Klik \"Print\" pada menu.", "correct": "B", "next": "Refleksi5", "back": "Refleksi3"}, "Refleksi5": {"q": "Tombol pintas untuk menyalin teks adalah?", "a": "Tekan \"Ctrl + S\"", "b": "Tekan \"Ctrl + C\"", "correct": "B", "next": "Reward", "back": "Refleksi4"}}};
const STAGE_W=1366, STAGE_H=768;
const stage=document.getElementById('stage');
const music=document.getElementById('music'), clickSfx=document.getElementById('click'), correctSfx=document.getElementById('correct'), failSfx=document.getElementById('fail');
let currentScene='utama', sceneToken=0, timerHandle=null, audioUnlocked=false;
let score=0;
let answered={Refleksi1:false,Refleksi2:false,Refleksi3:false,Refleksi4:false,Refleksi5:false};

function resizeStage(){const s=Math.min(innerWidth/STAGE_W,innerHeight/STAGE_H);stage.style.transform=`translate(-50%,-50%) scale(${s})`}
addEventListener('resize',resizeStage);resizeStage();
function unlockAudio(){if(audioUnlocked)return;audioUnlocked=true;music.volume=.32;music.play().catch(()=>{});}
addEventListener('pointerdown',unlockAudio,{once:true});
function playSound(el){try{el.currentTime=0;el.play().catch(()=>{})}catch(e){}}
function ensureMusic(){if(audioUnlocked && music.paused){music.play().catch(()=>{})}}
function stopMusic(){try{music.pause();music.currentTime=0}catch(e){}}
function bg(scene){const im=document.createElement('img');im.className='scene-bg';im.src=CONFIG.backgrounds[scene];im.alt='';stage.appendChild(im);}
function el(tag,cls,styles={}){const n=document.createElement(tag);if(cls)n.className=cls;Object.assign(n.style,styles);return n}
function place(n,r){n.style.left=r[0]+'px';n.style.top=r[1]+'px';n.style.width=r[2]+'px';n.style.height=r[3]+'px';return n}
function button(b){const x=el('button','control'+(b.hotspot?' hotspot':''));place(x,b.rect);x.type='button';x.setAttribute('aria-label',b.id||'Tombol');if(b.img){const im=new Image();im.src=b.img;im.alt='';x.appendChild(im)}if(b.to)x.addEventListener('click',()=>{playSound(clickSfx); if(b.reset)resetProgress(); go(b.to)});stage.appendChild(x);return x}
function clearStage(){sceneToken++;if(timerHandle){clearInterval(timerHandle);timerHandle=null}stage.innerHTML=''}
function resetProgress(){score=0;for(const k in answered)answered[k]=false}
function go(scene,opts={}){clearStage();currentScene=scene;bg(scene);ensureMusic();
 if(CONFIG.simpleButtons[scene]){if(scene==='Puzzle1'&&!opts.keepScore)resetProgress();CONFIG.simpleButtons[scene].forEach(button)}
 if(CONFIG.puzzles[scene])renderPuzzle(scene);
 else if(CONFIG.reflections[scene])renderReflection(scene,opts);
 else if(scene==='Reward')renderReward();
}

function addImg(src,r,cls='absolute-img'){const im=new Image();im.src=src;im.className=cls;place(im,r);stage.appendChild(im);return im}

function renderPuzzle(scene){
 const token=sceneToken, p=CONFIG.puzzles[scene];
 // Nav controls are already drawn in the background.
 button({id:'KEMBALI',rect:[48,655,305,92],to:p.back,hotspot:true});
 button({id:'BERIKUTNYA',rect:[997,655,320,92],to:p.next,hotspot:true});
 addImg(CONFIG.visible.GarisBiru,[32.6,121.6,564,533]);
 const prev=scene==='Puzzle2'?'Sprite':scene==='Puzzle3'?'SpritePuzzle3':'SpritePuzzle4';
 addImg(CONFIG.visible[prev],[1123,115,222,176]);
 const slots=[ [53,145],[232,145],[413,146],[53,315],[233,315],[414,315],[52,481],[235,481],[415,481] ];
 // Empty-box graphics sit behind the pieces.
 slots.forEach((s,i)=>addImg(CONFIG.visible.EmptyBox,[s[0],s[1],164,153]));
 const t=el('div','stage-text timer');t.textContent='25';stage.appendChild(t);
 const result=el('div','stage-text result');stage.appendChild(result);
 const homes=[[613,180],[776,180],[940,180],[613,333],[776,333],[940,333],[613,486],[776,486],[940,486]];
 const order=[0,1,2,3,4,5,6,7,8].sort(()=>Math.random()-.5);
 let complete=0, seconds=25, ended=false;
 function finish(win){if(ended)return;ended=true;if(timerHandle){clearInterval(timerHandle);timerHandle=null}result.textContent=win?'You Win..!!':'You Lose!';result.style.display='flex';stopMusic();playSound(win?correctSfx:failSfx);const nextToken=sceneToken;setTimeout(()=>{if(sceneToken!==nextToken)return;if(scene==='Puzzle4')resetProgress();go(p.next,{fromPuzzle:true});},1500)}
 const pieces=[];
 order.forEach((frame,pos)=>{
   const im=addImg(`assets/img/${p.piece}_${frame}.png`,[homes[pos][0],homes[pos][1],164,153],'piece');
   im.dataset.frame=frame;im.dataset.home=pos;pieces.push(im);
   let dragging=false,ox=0,oy=0,startX=homes[pos][0],startY=homes[pos][1];
   im.addEventListener('pointerdown',ev=>{if(ended||im.classList.contains('locked'))return;dragging=true;im.setPointerCapture(ev.pointerId);const r=stage.getBoundingClientRect();const scale=r.width/STAGE_W;ox=(ev.clientX-r.left)/scale-parseFloat(im.style.left);oy=(ev.clientY-r.top)/scale-parseFloat(im.style.top);im.classList.add('dragging');ev.preventDefault()});
   im.addEventListener('pointermove',ev=>{if(!dragging)return;const r=stage.getBoundingClientRect();const scale=r.width/STAGE_W;let x=(ev.clientX-r.left)/scale-ox,y=(ev.clientY-r.top)/scale-oy;x=Math.max(0,Math.min(STAGE_W-164,x));y=Math.max(0,Math.min(STAGE_H-153,y));im.style.left=x+'px';im.style.top=y+'px';ev.preventDefault()});
   function drop(ev){if(!dragging)return;dragging=false;im.classList.remove('dragging');try{im.releasePointerCapture(ev.pointerId)}catch(e){}const frame=+im.dataset.frame;const target=slots[frame];const x=parseFloat(im.style.left),y=parseFloat(im.style.top);const cx=x+82,cy=y+76.5,tx=target[0]+82,ty=target[1]+76.5;if(Math.hypot(cx-tx,cy-ty)<105){im.style.left=target[0]+'px';im.style.top=target[1]+'px';im.classList.add('locked');complete++;playSound(correctSfx);if(complete===9)finish(true)}else{im.style.left=startX+'px';im.style.top=startY+'px'}}
   im.addEventListener('pointerup',drop);im.addEventListener('pointercancel',drop);
 });
 timerHandle=setInterval(()=>{if(ended||sceneToken!==token)return;seconds--;t.textContent=seconds;if(seconds<=0)finish(false)},1000);
}

function renderReflection(scene,opts={}){
 const d=CONFIG.reflections[scene];
 if(d.resetQuiz && opts.fromPuzzle){resetProgress()}
 const q=el('div','stage-text ref-question');q.textContent=d.q;stage.appendChild(q);
 const num=scene.slice(-1);
 const a=button({id:'Jawaban A',rect:[273,354,820,102],img:CONFIG.visible[`Ref${num}A`]});
 const b=button({id:'Jawaban B',rect:[273,484,820,102],img:CONFIG.visible[`Ref${num}B`]});
 const at=el('div','stage-text ref-answer-text ref-a-text');at.textContent=d.a;stage.appendChild(at);
 const bt=el('div','stage-text ref-answer-text ref-b-text');bt.textContent=d.b;stage.appendChild(bt);
 const back=button({id:'Kembali',rect:[48,660,330,96],img:CONFIG.visible[`RefBack${num}`]});
 const next=button({id:'Berikutnya',rect:[995,660,330,96],img:CONFIG.visible[`RefNext${num}`]});
 const ok=addImg(CONFIG.visible.Ref2PopupOK,[303,99,760,570],'popup');
 const wrong=addImg(CONFIG.visible.Ref2PopupWrong,[303,99,760,570],'popup');
 let locked=false;
 function answer(choice){if(locked||answered[scene])return;locked=true;answered[scene]=true;playSound(clickSfx);q.style.display=at.style.display=bt.style.display='none';a.style.display=b.style.display='none';const correct=choice===d.correct;if(correct){score+=20;ok.style.display='block';playSound(correctSfx)}else{wrong.style.display='block';playSound(failSfx)}const token=sceneToken;setTimeout(()=>{if(sceneToken===token)go(d.next)},1500)}
 a.onclick=()=>answer('A');b.onclick=()=>answer('B');
 back.onclick=()=>{playSound(clickSfx);go(d.back)};
 next.onclick=()=>{playSound(clickSfx);go(d.next)};
}
function renderReward(){const s=el('div','stage-text score');s.textContent=score;stage.appendChild(s);const token=sceneToken;setTimeout(()=>{if(sceneToken===token)go('LevelSelesai')},3000)}

// Preload important images, then start.
const preload=[CONFIG.backgrounds.utama,CONFIG.visible.MULAI,CONFIG.visible.PANDUAN];
Promise.all(preload.map(src=>new Promise(res=>{const i=new Image();i.onload=i.onerror=res;i.src=src}))).then(()=>go('utama'));
</script>
</body>
</html>
